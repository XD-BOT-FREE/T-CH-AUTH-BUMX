<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth Token Extractor</title>

<style>
:root {
    --bg: #0d1117;
    --card: #161b22;
    --accent: #00ff9c;
    --text: #c9d1d9;
    --border: #30363d;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 640px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
}

/* TITLE */
.title {
    text-align: center;
    font-size: 20px;
    color: var(--accent);
    margin-bottom: 16px;
}

/* TEXTAREA */
textarea {
    width: 100%;
    min-height: 160px;
    background: var(--bg);
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    resize: vertical;
    font-size: 13px;
}

/* BUTTON */
.btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

.btn:active {
    opacity: 0.8;
}

/* RESULT */
.result {
    margin-top: 15px;
    display: none;
}

.output {
    background: #000;
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 8px;
    word-break: break-all;
    max-height: 140px;
    overflow-y: auto;
    color: var(--accent);
}

/* COPY */
.copy {
    margin-top: 8px;
    background: #238636;
    color: white;
}

.copy.success {
    background: #2ea043;
}

/* RESPONSIVE */
@media (max-width: 480px) {
    .container {
        padding: 15px;
    }

    .title {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="title">AUTH TOKEN EXTRACTOR</div>

    <textarea id="input" placeholder="Dán curl / headers vào đây..."></textarea>

    <button class="btn" onclick="extract()">TÁCH TOKEN</button>

    <div class="result" id="result">
        <div class="output" id="output"></div>
        <button class="btn copy" id="copyBtn" onclick="copy()">COPY</button>
    </div>
</div>

<script>
function extract() {
    const input = document.getElementById("input").value;
    const output = document.getElementById("output");
    const result = document.getElementById("result");

    // MULTI REGEX (chuẩn hơn)
    const patterns = [
        /Authorization:\s*Bearer\s+([A-Za-z0-9\-._~+/]+=*)/i,
        /Authorization:\s*([A-Za-z0-9\-._~+/]+=*)/i,
        /access_token["']?\s*[:=]\s*["']([^"']+)["']/i,
        /token["']?\s*[:=]\s*["']([^"']+)["']/i
    ];

    let found = null;

    for (let regex of patterns) {
        const match = input.match(regex);
        if (match && match[1]) {
            found = match[1];
            break;
        }
    }

    output.textContent = found ? found : "Không tìm thấy token!";
    result.style.display = "block";
}

function copy() {
    const text = document.getElementById("output").textContent;
    const btn = document.getElementById("copyBtn");

    if (!navigator.clipboard) {
        alert("Trình duyệt không hỗ trợ copy!");
        return;
    }

    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "ĐÃ COPY";
        btn.classList.add("success");

        setTimeout(() => {
            btn.textContent = "COPY";
            btn.classList.remove("success");
        }, 2000);
    });
}
</script>

</body>
</html>
